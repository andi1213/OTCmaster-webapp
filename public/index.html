<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OTC Master</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="topbar">
      <button id="btn-back" class="icon-btn hidden" onclick="goBack()">&#8592;</button>
      <h1 id="topbar-title">OTC Master</h1>
      <button id="btn-settings" class="icon-btn" onclick="showSettings()">&#9881;</button>
    </header>

    <!-- Main Mode Tabs -->
    <nav id="mode-tabs">
      <button class="tab active" data-mode="content" onclick="switchMode('content')">내용 정리</button>
      <button class="tab" data-mode="recommend" onclick="switchMode('recommend')">빠른 추천</button>
      <button class="tab" data-mode="sim" onclick="switchMode('sim')">복약지도 시뮬레이션</button>
    </nav>

    <!-- MODE 1: 내용 정리 -->
    <div id="screen-content" class="screen active">
      <div class="search-bar">
        <input type="text" id="content-search" placeholder="카테고리 검색..." oninput="filterCategories()">
      </div>
      <div id="category-list"></div>
    </div>

    <!-- Content Detail -->
    <div id="screen-content-detail" class="screen">
      <div id="content-detail-body"></div>
    </div>

    <!-- MODE 2: 빠른 추천 -->
    <div id="screen-recommend" class="screen">
      <div class="notice-box">
        <p class="notice-icon">🚧</p>
        <h2>준비중</h2>
        <p>빠른 추천 기능은 현재 개발 중입니다.</p>
      </div>
    </div>

    <!-- MODE 3: 복약지도 시뮬레이션 -->
    <div id="screen-sim" class="screen">
      <div id="sim-category-list"></div>
    </div>

    <!-- Sim: Patient Type Select -->
    <div id="screen-sim-patient" class="screen">
      <h2 class="section-title">환자 유형 선택</h2>
      <div id="patient-type-list"></div>
    </div>

    <!-- Sim: Chat (문진) -->
    <div id="screen-sim-chat" class="screen">
      <div id="chat-messages" class="chat-container"></div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="약사로서 환자에게 질문하세요..." rows="2"></textarea>
        <div class="chat-buttons">
          <button onclick="sendChat()" class="btn-primary">전송</button>
          <button onclick="goToIngredientSelect()" class="btn-secondary">성분 선택 →</button>
        </div>
      </div>
    </div>

    <!-- Sim: Ingredient Select -->
    <div id="screen-sim-ingredient" class="screen">
      <h2 class="section-title">성분 선택</h2>
      <div class="toggle-row" id="ing-mode-chips">
        <button class="btn-toggle" data-mode="written" onclick="setIngMode('written')">주관식</button>
        <button class="btn-toggle" data-mode="choice_plain" onclick="setIngMode('choice_plain')">선택지</button>
        <button class="btn-toggle active" data-mode="choice_desc" onclick="setIngMode('choice_desc')">선택지+설명</button>
      </div>
      <div id="ing-checkbox-mode">
        <div id="ingredient-groups"></div>
      </div>
      <div id="ing-text-mode" class="hidden" style="padding:0 16px">
        <div class="selected-chips" id="written-chips"></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input type="text" id="ing-text-input" placeholder="성분명 직접 입력 (예: 아세트아미노펜)" style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none">
          <button onclick="addWrittenIngredient()" class="btn-primary" style="white-space:nowrap">추가</button>
        </div>
        <p style="font-size:12px;color:#999;margin-top:8px">추가 후 계속 입력할 수 있습니다. 쉼표(,)로 여러 성분 동시 입력 가능</p>
      </div>
      <div class="bottom-action">
        <button onclick="goToProductSelect()" class="btn-primary btn-full">제품 선택으로 →</button>
      </div>
    </div>

    <!-- Sim: Product Select -->
    <div id="screen-sim-product" class="screen">
      <h2 class="section-title">제품 선택</h2>
      <div class="toggle-row" id="prod-mode-chips">
        <button class="btn-toggle" data-mode="name_only" onclick="setProdMode('name_only')">제품명만</button>
        <button class="btn-toggle active" data-mode="name_desc" onclick="setProdMode('name_desc')">제품명+성분</button>
      </div>
      <div id="product-groups"></div>
      <div class="bottom-action">
        <button onclick="goToCounseling()" class="btn-primary btn-full">복약지도 시작 →</button>
      </div>
    </div>

    <!-- Sim: Counseling Chat -->
    <div id="screen-sim-counseling" class="screen">
      <div id="counseling-messages" class="chat-container"></div>
      <div class="chat-input-area">
        <textarea id="counseling-input" placeholder="환자에게 복약지도를 제공하세요..." rows="2"></textarea>
        <div class="chat-buttons">
          <button onclick="sendCounseling()" class="btn-primary">전송</button>
          <button onclick="requestEvaluation()" class="btn-accent">평가 받기</button>
        </div>
      </div>
    </div>

    <!-- Sim: Evaluation -->
    <div id="screen-sim-eval" class="screen">
      <div id="eval-result" class="eval-container"></div>
      <div id="eval-qa-area" style="padding:0 16px"></div>
      <div class="bottom-action">
        <button onclick="resetSim()" class="btn-primary btn-full">처음으로</button>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>설정</h2>
          <button class="icon-btn" onclick="hideSettings()">✕</button>
        </div>
        <div class="form-group">
          <label>OpenAI API Key</label>
          <input type="password" id="api-key-input" placeholder="sk-...">
        </div>
        <div class="form-group">
          <label>모델 선택</label>
          <select id="model-select">
            <option value="gpt-4o-mini">gpt-4o-mini</option>
            <option value="gpt-4o">gpt-4o</option>
            <option value="gpt-4.1-mini">gpt-4.1-mini</option>
            <option value="gpt-4.1-nano">gpt-4.1-nano</option>
          </select>
        </div>
        <button class="btn-primary btn-full" onclick="saveSettings()">저장</button>
      </div>
    </div>
  </div>

  <script src="data/categories.js"></script>
  <script src="data/drugs.js"></script>
  <script src="data/content.js"></script>
  <script src="app.js"></script>
</body>
</html>
